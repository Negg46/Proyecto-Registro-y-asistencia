<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistencia - Casino La Rioja</title>
    <style>
        body { font-family: Arial; background: #141414; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #000; padding: 40px; border: 2px solid red; border-radius: 15px; text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: none; font-size: 16px; }
        button { width: 100%; padding: 12px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #mensaje { margin-top: 20px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: red;">CASINO LA RIOJA</h2>
        <p>Ingrese su Identificación</p>
        <input type="text" id="dni" placeholder="Número de documento">
        <button onclick="validar()">VERIFICAR</button>
        <div id="mensaje"></div>
    </div>

    <script>
        async function validar() {
            const dni = document.getElementById('dni').value;
            const resDiv = document.getElementById('mensaje');
            
            try {
                const response = await fetch('http://localhost:5000/validar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({identificacion: dni})
                });
                const data = await response.json();
                
                if(data.status === 'success') {
                    resDiv.style.color = "lime";
                    resDiv.innerText = data.message;
                } else {
                    resDiv.style.color = "orange";
                    resDiv.innerText = data.message;
                    // Redirigir si no existe (crea un registro.html si lo deseas)
                    // setTimeout(() => window.location.href = "registro.html", 2000);
                }
            } catch (e) {
                resDiv.style.color = "red";
                resDiv.innerText = "Error: El servidor no está activo.";
            }
        }
    </script>
</body>
</html>
