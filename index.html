<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino La Rioja - Control de Asistencia</title>

<style>

body{
font-family:Arial;
background:#141414;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#000;
padding:40px;
border:2px solid red;
border-radius:15px;
text-align:center;
width:350px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border-radius:8px;
border:none;
background:#111;
color:white;
font-size:18px;
text-align:center;
}

button{
width:100%;
padding:15px;
background:red;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

#mensaje{
margin-top:20px;
font-size:16px;
}

#debug{
margin-top:20px;
font-size:13px;
color:#aaa;
word-break:break-all;
}

</style>
</head>

<body>

<div class="card">

<h2>CASINO LA RIOJA</h2>
<p>Control de asistencia</p>

<input id="dni" placeholder="Ingrese documento">

<button onclick="validar()">VERIFICAR ENTRADA</button>

<div id="mensaje"></div>
<div id="debug"></div>

</div>

<script>

const API = "http://127.0.0.1:5000/validar";

async function validar(){

let dni = document.getElementById("dni").value;
let mensaje = document.getElementById("mensaje");
let debug = document.getElementById("debug");

if(!dni){

mensaje.innerHTML="⚠ Debe ingresar un DNI";
mensaje.style.color="orange";
return;

}

debug.innerHTML="Enviando DNI: "+dni;

try{

let respuesta = await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
identificacion:dni
})
});

let datos = await respuesta.json();

mensaje.innerHTML="Respuesta del servidor: "+datos.message;
mensaje.style.color="lime";

debug.innerHTML="Respuesta completa API: "+JSON.stringify(datos);

}catch(error){

mensaje.innerHTML="❌ Error: el servidor no respondió";
mensaje.style.color="red";

debug.innerHTML="Error técnico: "+error;

}

}

document.getElementById("dni").addEventListener("keypress",function(e){
if(e.key==="Enter"){
validar();
}
});

</script>

</body>
</html>
